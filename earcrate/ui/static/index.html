<!doctype html>
<html><head><meta charset="utf-8"><title>earcrate</title><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" href="data:,">
<style>
/* earcrate // LATTICE — the design built in the DC mock, wired to the live backend.
   No-network local app: system fonts only (no Google Fonts link), so it works offline. */
html,body{margin:0;padding:0;height:100%}
*{box-sizing:border-box}
a{color:inherit;text-decoration:none}
::selection{background:rgba(255,176,32,.28)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#2C3A40;border:2px solid transparent;background-clip:padding-box}
@keyframes eqPulse{0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 22px var(--accGlow)}50%{box-shadow:0 0 52px var(--accGlow)}}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes indet{0%{left:-34%}100%{left:104%}}
body{background:#07090A;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
.hidden{display:none!important}
.clk{cursor:pointer}
.scrn{padding:22px 26px 40px;display:flex;flex-direction:column;gap:18px}
.lbl{font:600 9px/1 var(--mono);letter-spacing:.24em;text-transform:uppercase;color:var(--faint)}
.h1{font-family:var(--disp);font-weight:700;font-size:34px;line-height:.9;letter-spacing:.02em;color:var(--ink);text-transform:uppercase}
.card{background:var(--panel);border:1px solid var(--edge);padding:13px 14px}
.btn{font:600 9px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--dim);background:var(--panel2);border:1px solid var(--edge2);padding:9px 12px;cursor:pointer}
.btn:hover{border-color:var(--acc);color:var(--ink)}
.btn.primary{color:var(--accink);background:var(--acc);border-color:var(--acc)}
.btn.fault{color:var(--fault);border-color:var(--fault)}
</style>
</head>
<body>
<div id="app" style="height:100vh;display:flex;flex-direction:column;overflow:hidden">

  <!-- ===== COMMAND STRIP ===== -->
  <div style="display:flex;align-items:center;gap:20px;padding:11px 18px;background:var(--panel);border-bottom:1px solid var(--edge);flex:0 0 auto">
    <div style="display:flex;align-items:baseline;gap:8px">
      <span style="font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.06em;color:var(--ink);text-transform:uppercase">EARCRATE</span>
      <span style="font:600 9.5px/1 var(--mono);letter-spacing:.18em;color:var(--acc)">//LATTICE</span>
      <span style="font:400 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--faint)">__ENGINE_VERSION__</span>
    </div>
    <div style="flex:1;max-width:400px;display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--edge);padding:8px 12px">
      <svg width="12" height="12" viewBox="0 0 12 12" style="flex:0 0 auto"><circle cx="5" cy="5" r="3.3" fill="none" stroke="var(--faint)" stroke-width="1.3"></circle><line x1="7.6" y1="7.6" x2="11" y2="11" stroke="var(--faint)" stroke-width="1.3"></line></svg>
      <span style="font:600 8.5px/1 var(--mono);letter-spacing:.2em;color:var(--faint)">QUERY</span>
      <input id="query" placeholder="bpm:104-118 role:vox" oninput="onQuery()" style="flex:1;background:transparent;border:none;outline:none;font:400 11px/1 var(--mono);color:var(--dim)">
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:16px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font:600 8px/1 var(--mono);letter-spacing:.2em;color:var(--faint)">SKIN</span>
        <span id="skinStrip" style="display:flex;gap:5px"></span>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;width:120px">
        <div style="display:flex;justify-content:space-between;font:600 8.5px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint)"><span>crate·fit</span><b id="fitPct" style="color:var(--ink)">–</b></div>
        <div style="height:4px;background:var(--panel2);overflow:hidden"><i id="fitBar" style="display:block;height:100%;width:0%;background:var(--ink)"></i></div>
      </div>
      <span style="width:26px;height:26px;background:var(--panel2);border:1px solid var(--edge2);display:flex;align-items:center;justify-content:center;font:600 8.5px/1 var(--mono);color:var(--dim)">OP</span>
    </div>
  </div>

  <!-- ===== LIVE SYSTEM READOUT ===== -->
  <div style="display:flex;align-items:center;padding:8px 18px;background:var(--panel2);border-bottom:1px solid var(--edge);font:500 10px/1 var(--mono);letter-spacing:.07em;flex:0 0 auto">
    <span style="display:inline-flex;align-items:center;gap:7px;color:var(--faint)"><span id="onlineDot" style="width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 9px var(--accGlow)"></span><span id="onlineTxt">SYSTEM ONLINE</span></span>
    <span style="color:var(--edge2);margin:0 13px">│</span>
    <span style="color:var(--faint)">NOW ▸ <span id="nowTxt" style="color:var(--acc)">—</span></span>
    <span style="color:var(--edge2);margin:0 13px">│</span>
    <span style="color:var(--faint)">ENGINE ▸ <span id="engineTxt" style="color:var(--ink)">idle</span></span>
    <span style="margin-left:auto;color:var(--faint)" id="seedTxt">—</span>
  </div>

  <!-- ===== BODY: MODE RAIL + SCREEN ===== -->
  <div style="flex:1;display:flex;min-height:0">
    <div style="width:184px;flex:0 0 auto;background:var(--panel);border-right:1px solid var(--edge);padding:13px 0;overflow:auto">
      <div style="font:600 8.5px/1 var(--mono);letter-spacing:.24em;text-transform:uppercase;color:var(--faint);padding:0 15px 11px">Modes</div>
      <div id="navRail"></div>
      <div style="margin:15px 15px 0;padding-top:12px;border-top:1px solid var(--edge);font:500 8px/1.7 var(--mono);letter-spacing:.06em;color:var(--faint)">SHARED CHROME<br>▸ command strip<br>▸ transport<br>▸ system readout</div>
    </div>

    <div style="flex:1;min-width:0;overflow:auto;position:relative;background-image:repeating-linear-gradient(0deg,transparent 0 47px,var(--grid) 47px 48px),repeating-linear-gradient(90deg,transparent 0 47px,var(--grid) 47px 48px)">
      <div id="scr_play" class="scrn"></div>
      <div id="scr_crate" class="scrn hidden"></div>
      <div id="scr_workbench" class="scrn hidden"></div>
      <div id="scr_sessions" class="scrn hidden"></div>
      <div id="scr_activity" class="scrn hidden"></div>
      <div id="scr_library" class="scrn hidden"></div>
      <div id="scr_setup" class="scrn hidden"></div>
    </div>
  </div>

  <!-- ===== TRANSPORT ===== -->
  <div style="display:flex;align-items:center;gap:20px;padding:11px 18px;background:var(--panel);border-top:1px solid var(--edge);flex:0 0 auto">
    <div style="display:flex;align-items:center;gap:12px;width:270px;flex:0 0 auto">
      <span style="font:600 7.5px/1 var(--mono);letter-spacing:.2em;color:var(--edge2);writing-mode:vertical-rl;transform:rotate(180deg)">XPORT</span>
      <div style="min-width:0"><div id="xportName" style="font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.03em;color:var(--ink);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">none loaded</div><div id="xportSub" style="font:500 8.5px/1 var(--mono);letter-spacing:.05em;color:var(--faint);margin-top:3px">book a set or play a demo</div></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;max-width:540px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:22px">
        <span class="clk" onclick="playDemo()" title="Synthesize a warm-up demo set" style="font:600 9px/1 var(--mono);color:var(--dim)">DEMO</span>
        <svg class="clk" onclick="endlessPrev()" width="16" height="12" viewBox="0 0 16 12" title="Previous"><rect x="1" y="1" width="2" height="10" fill="var(--dim)"></rect><path d="M15 1 L6 6 L15 11 Z" fill="var(--dim)"></path></svg>
        <span onclick="togglePlay()" class="clk" style="width:40px;height:40px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--accGlow)">
          <span id="playGlyph"><svg width="12" height="13" viewBox="0 0 12 13"><path d="M1 1 L11 6.5 L1 12 Z" fill="var(--accink)"></path></svg></span>
        </span>
        <svg class="clk" onclick="endlessSkip()" width="16" height="12" viewBox="0 0 16 12" title="Next"><rect x="13" y="1" width="2" height="10" fill="var(--dim)"></rect><path d="M1 1 L10 6 L1 11 Z" fill="var(--dim)"></path></svg>
        <span id="endlessBtn" class="clk" onclick="toggleEndless()" title="Endless radio" style="font:600 15px/1 var(--mono);color:var(--acc)">∞</span>
      </div>
      <div style="display:flex;align-items:center;gap:11px;width:100%">
        <span id="tElapsed" style="font:500 9px/1 var(--mono);color:var(--acc)">0:00</span>
        <div style="flex:1;height:4px;background:var(--panel2);overflow:hidden"><i id="tBar" style="display:block;height:100%;width:0%;background:var(--acc)"></i></div>
        <span id="tDur" style="font:500 9px/1 var(--mono);color:var(--faint)">0:00</span>
      </div>
    </div>
    <div style="width:340px;flex:0 0 auto;display:flex;align-items:center;justify-content:flex-end;gap:11px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font:600 7.5px/1 var(--mono);letter-spacing:.2em;color:var(--edge2)">STATION</span>
        <span class="clk" onclick="station('fire')" style="font:600 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--ink);border:1px solid var(--edge2);padding:6px 9px">HOTTER +</span>
        <span class="clk" onclick="station('ice')" style="font:600 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--dim);border:1px solid var(--edge);padding:6px 9px">COOLER −</span>
        <span class="clk" onclick="station('skip')" style="font:600 8.5px/1 var(--mono);letter-spacing:.1em;color:var(--dim);border:1px solid var(--edge);padding:6px 9px">CUT</span>
      </div>
      <span style="font:500 10px/1 var(--mono);color:var(--faint);margin-left:4px">VOL</span>
      <div class="clk" onclick="setVol(event)" style="width:56px;height:4px;background:var(--panel2)"><i id="volBar" style="display:block;height:100%;width:85%;background:var(--dim)"></i></div>
    </div>
  </div>
</div>

<audio id="renderPlayer" preload="none"></audio>
<div id="toast" style="display:none;position:fixed;right:16px;bottom:78px;max-width:420px;z-index:99;background:var(--panel);border:1px solid var(--acc);padding:11px 13px;font:500 11px/1.4 var(--mono);color:var(--ink);box-shadow:0 8px 30px rgba(0,0,0,.5)"></div>

<script>
const TOKEN = new URL(location.href).searchParams.get('token') || '';
const SKINS = {
  lattice:  { name:"LATTICE",  swatch:"#FFB020", vars:"--bg:#07090A;--panel:#0D1113;--panel2:#141A1D;--edge:#1E272B;--edge2:#2C3A40;--ink:#DCE6E8;--dim:#7C8A90;--faint:#4A565B;--acc:#FFB020;--accink:#07090A;--accGlow:rgba(255,176,32,.4);--fault:#FF4D2E;--grid:rgba(44,58,64,.13)" },
  signal:   { name:"SIGNAL",   swatch:"#33E1D0", vars:"--bg:#05090B;--panel:#0A1114;--panel2:#10191D;--edge:#173038;--edge2:#224750;--ink:#DCEAEC;--dim:#769097;--faint:#456069;--acc:#33E1D0;--accink:#04100F;--accGlow:rgba(51,225,208,.38);--fault:#FF5B4A;--grid:rgba(34,71,80,.14)" },
  terminal: { name:"TERMINAL", swatch:"#5BE58A", vars:"--bg:#060B07;--panel:#0A130D;--panel2:#101C14;--edge:#183220;--edge2:#234A30;--ink:#D6ECDB;--dim:#77997F;--faint:#45604D;--acc:#5BE58A;--accink:#031007;--accGlow:rgba(91,229,138,.36);--fault:#FF6B4A;--grid:rgba(35,74,48,.14)" },
  paper:    { name:"PAPER",    swatch:"#B4791A", vars:"--bg:#ECE6D8;--panel:#F6F2E7;--panel2:#E6DFCE;--edge:#D2C9B4;--edge2:#B4A98F;--ink:#1B1712;--dim:#6A6152;--faint:#98907E;--acc:#B4791A;--accink:#FDF7E8;--accGlow:rgba(180,121,26,.32);--fault:#B4402A;--grid:rgba(120,110,90,.13)" },
};
const FONTS = "--disp:'Saira Condensed','Oswald','Bebas Neue',system-ui,sans-serif;--mono:ui-monospace,'JetBrains Mono','SF Mono','Cascadia Code',Consolas,monospace";
const NAV = [
  { id:"play", name:"Play", i:"00", glyph:"▶" },
  { id:"library", name:"Library", i:"01", glyph:"▤" },
  { id:"crate", name:"Crate", i:"02", glyph:"▦" },
  { id:"workbench", name:"Workbench", i:"03", glyph:"◇" },
  { id:"sessions", name:"Sessions", i:"04", glyph:"≣" },
  { id:"activity", name:"Activity", i:"05", glyph:"∿" },
  { id:"setup", name:"Setup", i:"06", glyph:"⬡" },
];
const ROLE_BUCKET = { floor:["DRUM_BREAK","BED_CHORD","TEXTURE"], fgnd:["VOX_HOOK","VOX_VERSE","VOX_SHOUT","RIFF_ID"], spark:["DROP_HIT","PICKUP_FILL","TRANSITION_TAIL","BASS_RIFF"] };
const KEYS = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

let S = { mode:"play", skin:(localStorage.getItem('ec_skin')||"lattice"), resident:(localStorage.getItem('ec_profile')||null), atom:0 };
let DATA = { residents:[], ranked:[], pairs:[], readiness:null };
let ENDLESS = { on:false, queue:[], i:-1 };

/* ---------- helpers ---------- */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function api(path, body){
  let r = await fetch(path,{method:body===undefined?'GET':'POST',headers:{'Content-Type':'application/json','X-JB-Token':TOKEN},body:body===undefined?undefined:JSON.stringify(body)});
  let txt = await r.text(); let j; try{j=JSON.parse(txt)}catch(e){j={raw:txt}}
  if(!r.ok) throw new Error(j.error||txt); return j;
}
async function post(p,b){ try{ return await api(p,b||{}); }catch(e){ toast('✕ '+e.message); throw e; } }
function audioUrl(path){ return '/api/audio?path='+encodeURIComponent(path)+'&token='+encodeURIComponent(TOKEN); }
function toast(msg){ const t=document.getElementById('toast'); t.innerHTML='<b>'+esc(msg)+'</b>'; t.style.display='block'; clearTimeout(window.__tt); window.__tt=setTimeout(()=>t.style.display='none',6000); }
function keyName(root,mode){ if(root==null||root==='') return '—'; return KEYS[((root%12)+12)%12]+(mode===0?'m':''); }
function hms(sec){ sec=Math.max(0,Math.round(sec||0)); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60; return (h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
function mmss(sec){ sec=Math.max(0,Math.round(sec||0)); return Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0'); }
function el(id){ return document.getElementById(id); }

/* ---------- skin + chrome ---------- */
function applySkin(){
  const sk = SKINS[S.skin] || SKINS.lattice;
  el('app').setAttribute('style', sk.vars+";"+FONTS+";height:100vh;display:flex;flex-direction:column;overflow:hidden;font-family:var(--mono);background:var(--bg);color:var(--ink)");
  el('skinStrip').innerHTML = Object.keys(SKINS).map(k=>{
    const on=k===S.skin;
    return '<button onclick="setSkin(\''+k+'\')" style="font:600 8.5px/1 var(--mono);letter-spacing:.08em;color:'+(on?'var(--accink)':'var(--dim)')+';background:'+(on?'var(--acc)':'transparent')+';border:1px solid '+(on?'var(--acc)':'var(--edge2)')+';padding:6px 9px;cursor:pointer">'+SKINS[k].name+'</button>';
  }).join('');
}
function setSkin(k){ S.skin=k; localStorage.setItem('ec_skin',k); applySkin(); if(S.mode==='setup')renderSetup(); }
function renderNav(){
  el('navRail').innerHTML = NAV.map(n=>{
    const on=S.mode===n.id;
    return '<div onclick="go(\''+n.id+'\')" class="clk" style="display:flex;align-items:center;gap:11px;padding:11px 15px;background:'+(on?'color-mix(in srgb, var(--acc) 8%, transparent)':'transparent')+';border-left:3px solid '+(on?'var(--acc)':'transparent')+'">'
      +'<span style="font-family:var(--mono);font-size:13px;width:15px;text-align:center;color:'+(on?'var(--ink)':'var(--dim)')+'">'+n.glyph+'</span>'
      +'<span style="font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.06em;color:'+(on?'var(--ink)':'var(--dim)')+';text-transform:uppercase">'+n.name+'</span>'
      +'<span style="margin-left:auto;font:600 8px/1 var(--mono);color:'+(on?'var(--acc)':'var(--faint)')+'">'+n.i+'</span></div>';
  }).join('');
}
function go(mode){
  S.mode=mode; renderNav();
  for(const n of NAV) el('scr_'+n.id).classList.toggle('hidden', n.id!==mode);
  ({play:renderPlay, crate:renderCrate, workbench:renderWorkbench, sessions:renderSessions, activity:renderActivity, library:renderLibrary, setup:renderSetup}[mode])();
}

/* ---------- resident helpers ---------- */
function activeResident(){ return DATA.residents.find(r=>r.id===S.resident) || DATA.residents[0] || null; }
function verdictOf(r){
  if(!r) return {txt:"NO RESIDENTS", ink:"var(--faint)"};
  if(r.never_auditioned) return {txt:"NEVER AUDITIONED", ink:"var(--dim)"};
  if(r.ready) return {txt:"CLEARED TO PLAY", ink:"var(--acc)"};
  return {txt:"WANTS MATERIAL", ink:"var(--fault)"};
}
function updateChrome(){
  const r = activeResident();
  el('fitPct').textContent = r && r.readiness_pct!=null ? r.readiness_pct+'%' : '–';
  el('fitBar').style.width = (r && r.readiness_pct!=null ? r.readiness_pct : 0)+'%';
  el('nowTxt').textContent = r ? (String(r.name||r.id).toUpperCase()) : '—';
  el('seedTxt').textContent = r ? ((r.version?('v'+r.version):'') + (r.hash?(' · #'+String(r.hash).slice(0,4)):'')) : '—';
}

/* ---------- PLAY ---------- */
async function renderPlay(){
  const scr = el('scr_play'); scr.innerHTML = '<div class="lbl">loading residents…</div>';
  try{
    const j = await api('/api/residents'); DATA.residents = j.items||[];
    if(!S.resident && DATA.residents[0]) S.resident = DATA.residents[0].id;
  }catch(e){ scr.innerHTML='<div class="lbl" style="color:var(--fault)">residents unavailable: '+esc(e.message)+'</div>'; return; }
  updateChrome();
  const r = activeResident();
  const roster = DATA.residents.map((x,i)=>{
    const on=x.id===S.resident, v=verdictOf(x);
    return '<div onclick="pickResident(\''+esc(x.id)+'\')" class="clk" style="flex:1;min-width:220px;background:'+(on?'color-mix(in srgb, var(--acc) 7%, transparent)':'var(--panel)')+';border:1px solid '+(on?'var(--acc)':'var(--edge)')+';border-left:3px solid '+(on?'var(--acc)':'var(--edge2)')+';padding:12px 14px;display:flex;align-items:center;gap:13px">'
      +'<span style="font-family:var(--mono);font-weight:600;font-size:9px;color:'+(on?'var(--acc)':'var(--edge2)')+'">'+String(i+1).padStart(2,'0')+'</span>'
      +'<div style="min-width:0;flex:1"><div style="font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.03em;color:var(--ink);text-transform:uppercase">'+esc(x.name||x.id)+'</div>'
      +'<div style="font:500 9px/1.3 var(--mono);letter-spacing:.05em;color:var(--dim);margin-top:2px">'+esc(x.id)+' · fit '+(x.readiness_pct!=null?x.readiness_pct+'%':'–')+'</div></div>'
      +'<span style="font:600 8px/1 var(--mono);letter-spacing:.13em;color:'+v.ink+'">'+v.txt+'</span></div>';
  }).join('');
  const v = verdictOf(r);
  const end = (r&&r.endless)||{};
  const noRepeat = end.no_repeat_seconds!=null ? hms(end.no_repeat_seconds) : '—';
  const sources = (r&&r.sources!=null) ? r.sources : '—';
  const toEnd = end.sources_needed_for_endless!=null ? ('+'+Math.max(0, end.sources_needed_for_endless - (Number(sources)||0))) : '—';
  const dens = (r&&r.density)||{};
  const wave = Array.from({length:46},(_,i)=>{ const h=(14+Math.abs(Math.sin(i*0.7)*0.62+Math.sin(i*2.3+1)*0.38)*86).toFixed(0); return '<span style="flex:1;height:'+h+'%;background:var(--acc);opacity:.5;transform-origin:bottom;animation:eqPulse '+(1.05+(i%5)*0.12).toFixed(2)+'s ease-in-out '+(i*0.05).toFixed(2)+'s infinite"></span>'; }).join('');
  scr.innerHTML =
    '<div><div class="lbl" style="margin-bottom:11px">[ Residents // '+String(DATA.residents.length).padStart(2,'0')+' ]</div><div style="display:flex;gap:12px;flex-wrap:wrap">'+roster+'</div></div>'
    +'<div style="display:flex;flex-direction:column;gap:14px">'
    +'<div style="display:flex;align-items:flex-end;gap:16px"><div style="width:5px;height:56px;background:var(--acc);flex:0 0 auto;box-shadow:0 0 12px var(--accGlow)"></div>'
    +'<div style="font-family:var(--disp);font-weight:700;font-size:66px;line-height:.82;color:var(--ink);text-transform:uppercase">'+esc(r?(r.name||r.id):'—')+'</div>'
    +'<span style="display:inline-flex;align-items:center;gap:7px;font:600 10px/1 var(--mono);letter-spacing:.13em;color:'+v.ink+';padding-bottom:7px"><span style="width:7px;height:7px;border-radius:50%;background:'+v.ink+'"></span>'+v.txt+'</span></div>'
    +'<div style="font:400 11.5px/1.5 var(--mono);color:var(--dim);max-width:640px">'+esc(r?(r.contract||''):'')+'</div>'

/* ---------- WORKBENCH // immutable projects (frozen /api/projects contract) ----------
   Loose-arrangement rendering (/api/timeline/propose, /api/render_plan) is GONE.

   project is refetched after each one because mastering authors a child revision.
   The UI never posts an arbitrary arrangement to the renderer. */
const RAILS = [["floor","Floor"],["foreground","Fgnd"],["spark","Spark"]];
const CLIP_CMDS = ["set_gain","set_pan","trim_clip","replace_clip","set_stem","mute","solo","lock","unlock"];
let WB = { pid:(localStorage.getItem('ec_pid')||null), proj:null, rev:null, sel:{type:null,id:null}, view:"timeline", run:null, receipt:null };
function wbHead(){ return WB.proj && WB.rev && WB.rev.revision_sha===WB.proj.active_revision_sha; }
function wbShort(s){ return s? String(s).slice(0,12) : '—'; }
function wbBpm(){ return WB.rev? Number((WB.rev.arrangement||{}).bpm||0) : 0; }
function wbTotalBars(){ const secs=((WB.rev||{}).arrangement||{}).sections||[]; return secs.reduce((m,s)=>Math.max(m,(s.bar_start||0)+(s.bars||0)),0)||1; }
function wbDurationS(){ const b=wbTotalBars(), bpm=wbBpm()||120; return b*4*60/bpm; }
function wbPersona(){ return (((WB.rev||{}).intent||{}).taste_profile||{}).id || '—'; }
function wbSeed(){ const r=WB.rev||{}; const i=r.intent||{}, a=r.arrangement||{}; return (i.seed!=null?i.seed:(a.seed!=null?a.seed:((a.params||{}).seed))); }
function wbGate(){ const g=((WB.rev||{}).static_gate_receipt)||{}; const pf=(g.preflight||{}).passed!==false, tg=(g.taste_gate||{}).passed!==false; return {pass:pf&&tg, pf, tg, failures:[].concat((g.preflight||{}).failures||[],(g.taste_gate||{}).failures||[])}; }
function wbMixPolicy(){ return ((((WB.rev||{}).intent||{}).compiled_policy||{}).mix_policy)||{}; }
function wbGainBounds(rail){ const g=(wbMixPolicy().role_gain_db||{})[rail]; return g?{min:g.min,target:g.target,max:g.max}:{min:-24,target:-8,max:6}; }
function wbPanMax(){ const p=wbMixPolicy().pan_max_abs; return (p!=null?Number(p):0.35); }
function wbLockedClips(){ const s=new Set(); ((WB.rev||{}).locks||[]).forEach(l=>{ if(l.target_type==='clip') s.add(String(l.target_id)); }); ((WB.rev||{}).tracks||[]).forEach(t=>(t.clips||[]).forEach(c=>{ if(c.locked) s.add(String(c.clip_id)); })); return s; }

function wbSourceLabel(ref){ const sr=((WB.rev||{}).source_registry||{})[ref]||{}; const p=sr.path?String(sr.path).split(/[\\/]/).pop():''; return p||sr.kind||ref||'—'; }

function wbRenderTimeline(main){

  const lockedC=wbLockedClips(); const lockedT=wbLockedTrans();
  const tickRow='<div style="display:flex;gap:8px;margin-bottom:8px"><div style="width:74px;flex:0 0 auto"></div><div style="flex:1;position:relative;height:14px;border-bottom:1px solid var(--edge)">'
    + secs.map(s=>{ const left=(s.bar_start/total*100); return '<span style="position:absolute;left:'+left.toFixed(2)+'%;top:0;font:500 7.5px/1 var(--mono);color:var(--faint)">'+esc(String(s.type||'').slice(0,6))+'·'+(s.bar_start||0)+'</span>'; }).join('')
    +'<span style="position:absolute;right:0;top:0;font:500 7.5px/1 var(--mono);color:var(--faint)">'+total+' bars</span></div></div>';
  // transition boundary markers (selectable) sit above the rails
  const transRow='<div style="display:flex;gap:8px;margin-bottom:4px"><div style="width:74px;flex:0 0 auto;font:600 8px/1 var(--mono);color:var(--faint);display:flex;align-items:center">TRANS</div><div style="flex:1;position:relative;height:22px">'
    + secs.map(s=>{ const tr=(s.transition_in||{}); const tid=tr.transition_id; if(!tid) return ''; const left=(s.bar_start/total*100);
        const on=WB.sel.type==='transition'&&WB.sel.id===tid; const lk=lockedT.has(String(tid));
        return '<span class="clk" onclick="wbSelTransition(\''+esc(tid)+'\')" title="'+esc(tr.type||tr.technique||'')+'" style="position:absolute;left:'+left.toFixed(2)+'%;top:0;transform:translateX(-50%);font:600 7.5px/1 var(--mono);color:'+(on?'var(--accink)':(lk?'var(--acc)':'var(--dim)'))+';background:'+(on?'var(--acc)':'var(--panel2)')+';border:1px solid '+(on?'var(--acc)':'var(--edge2)')+';padding:4px 6px;white-space:nowrap">'+(lk?'⛒':'')+esc((tr.type||tr.technique||'cut')).slice(0,10)+'</span>'; }).join('')
    +'</div></div>';
  const railRow=([rail,nm])=>{
    // gather every layer on this rail across all sections (do NOT reduce to first)
    let blocks='';
    secs.forEach(s=>{ (s.layers||[]).forEach(l=>{ if((l.rail||wbRailOf(l))!==rail) return;
      const bar=(s.bar_start||0)+(l.bar_offset||0); const len=(l.bar_len||1);
      const left=(bar/total*100), w=Math.max(1.5,len/total*100);
      const cid=l.clip_id; const on=WB.sel.type==='clip'&&WB.sel.id===cid; const lk=lockedC.has(String(cid));
      const mut=l.muted, solo=l.solo;
      const stem=(l.stem_choice&&l.stem_choice.choice)||'mix';
      const src=wbSourceLabel(l.source_ref_id);
      blocks+='<div class="clk" onclick="wbSelClip(\''+esc(cid)+'\')" style="position:absolute;left:'+left.toFixed(2)+'%;width:'+w.toFixed(2)+'%;top:2px;bottom:2px;overflow:hidden;background:'+(on?'color-mix(in srgb,var(--acc) 20%,transparent)':(mut?'var(--panel2)':'color-mix(in srgb,var(--acc) 7%,transparent)'))+';border:1px solid '+(on?'var(--acc)':(lk?'var(--acc)':'var(--edge2)'))+';padding:3px 5px">'
        +'<div style="font:600 7px/1 var(--mono);color:'+(on?'var(--ink)':'var(--dim)')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(lk?'⛒ ':'')+(solo?'◎ ':'')+(mut?'⊘ ':'')+esc(l.ear_role||l.role||'')+'</div>'
        +'<div style="font:500 8px/1.1 var(--mono);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">'+esc(src)+'</div>'
        +'<div style="font:500 7px/1 var(--mono);color:var(--faint);margin-top:2px">'+(l.gain_db!=null?Number(l.gain_db).toFixed(1)+'dB':'')+(l.pan?(' · pan '+Number(l.pan).toFixed(2)):'')+' · '+esc(stem)+'</div></div>';
    }); });
    if(!blocks) blocks='<span style="position:absolute;left:6px;top:50%;transform:translateY(-50%);font:500 8.5px/1 var(--mono);color:var(--faint)">no clips on this rail</span>';
    return '<div style="display:flex;gap:8px;align-items:stretch;margin-bottom:6px"><div style="width:74px;flex:0 0 auto;display:flex;align-items:center"><span style="font-family:var(--disp);font-weight:700;font-size:14px;color:var(--dim);text-transform:uppercase">'+nm+'</span></div>'
      +'<div style="flex:1;position:relative;height:58px;background:var(--panel);border:1px solid var(--edge)">'+blocks+'</div></div>';
  };
  const n=secs.reduce((a,s)=>a+(s.layers||[]).length,0);
  main.innerHTML='<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px"><span class="lbl">[ Three-rail timeline · '+n+' clips ]</span><span style="font:500 9px/1 var(--mono);color:var(--faint)">click a clip or transition to inspect</span></div>'
    +tickRow+transRow+RAILS.map(railRow).join('')
    +'<div style="font:400 8px/1.4 var(--mono);color:var(--faint);margin-top:8px">every executable layer is shown — a section is never collapsed to its first clip. ⛒ locked · ⊘ muted · ◎ solo</div></div>';

async function wbCmd(kind, payload){

  const K={mute:'mute_clip', solo:'solo_clip'}[kind]||kind;
  payload=payload||{};
  // honor the clip inspector's explicit override toggle (backend feature; only
  // clip mutations carry it — lock/unlock never gate).
  const ov=el('wbOv'); if(ov&&ov.checked&&['set_gain','set_pan','trim_clip','replace_clip','set_stem','mute_clip','solo_clip','move_clip'].indexOf(K)>=0) payload.override_policy=true;
  try{ await post('/api/projects/'+encodeURIComponent(WB.pid)+'/commands',{actor:'human', kind:K, payload:payload}); toast('✓ '+K+' — new revision'); await wbRefresh(); }
  catch(e){ /* toast already shown by post(); a policy refusal is expected feedback */ await wbRefresh(); }
}

let REORG={signature:null, journal:null};
async function reorgPreview(){ toast('Reorganize preview…'); try{ const j=await post('/api/reorganize/plan',{}); if(j.ok===false){toast(j.error||'preview failed');return;} REORG.signature=j.signature; toast('DRY-RUN: '+(j.planned||0)+' moves, '+(j.quarantined||0)+' → _unsorted. Nothing moved — press Apply.'); }catch(e){} }
async function reorgApply(){
  if(!REORG.signature){toast('Preview first (dry-run before any move)');return;}
  let j; try{ j=await post('/api/reorganize/apply',{signature:REORG.signature}); }catch(e){return;}
  if(j.rollback_available && j.journal && j.journal.durable){ REORG.journal=j.journal.path; } else { REORG.journal=null; }
  if(j.errors && j.errors.length) console.error('reorganize errors:', j.errors);
  const firstErr=(j.errors&&j.errors[0])?(' — e.g. '+(j.errors[0].src||'')+': '+(j.errors[0].error||'')):'';
  switch(j.outcome){
    case 'complete': toast('Reorganized '+j.moved+'/'+j.planned+' files. Rollback available.'); loadTracks(); break;
    case 'partial': toast('Reorganized '+j.moved+'/'+j.planned+' files; '+j.failed+' failed'+firstErr+'. Rollback available.'); loadTracks(); break;
    case 'failed': toast('No files reorganized; '+(j.failed||0)+' failed'+firstErr+'.'); break;
    case 'refused': toast(j.error||'apply refused (re-preview)'); break;
    case 'integrity_error': toast((j.moved||0)+' file(s) may have changed but the rollback receipt could not be verified'+firstErr+'. Do not re-apply — check console and the library on disk.'); break;
    default: toast(j.error||'apply refused (re-preview)');
  }
}
async function reorgRollback(){ if(!REORG.journal){toast('Nothing to undo — no applied reorganize this session');return;} try{ const dry=await post('/api/reorganize/rollback',{journal:REORG.journal, apply:false}); const n=dry.restored||dry.would_restore||dry.planned||0; if(!window.confirm('Undo the reorganize? Restores ~'+n+' files to their original locations.')) return; const j=await post('/api/reorganize/rollback',{journal:REORG.journal, apply:true}); toast(j.ok?('Undo complete: '+(j.restored||0)+' files restored'):(j.error||'undo failed')); loadTracks(); }catch(e){} }

async function browseInto(id){ try{ const j=await post('/api/browse_dir',{current:el(id).value}); if(j.ok&&j.path) el(id).value=j.path; }catch(e){} }
async function scoutDrives(){ toast('Scouting for a workspace next to your music…'); try{ const j=await post('/api/workspace_candidates',{music_folder:el('setMusic').value}); const cands=j.candidates||j.items||(j.workspace_folder?[{path:j.workspace_folder}]:[]); if(cands.length){ el('setWs').value=cands[0].path||cands[0]; toast('Scouted '+cands.length+' workspace candidate(s) — top one filled in'); } else toast('No candidates found — pick a workspace manually'); }catch(e){} }
async function saveWorkspace(){ try{ const j=await post('/api/config_workspace',{music_folder:el('setMusic').value, workspace_folder:el('setWs').value}); toast(j.ok!==false?'Workspace saved':(j.error||'save failed')); }catch(e){} }
async function toggleWorkers(){ try{ const d=await api('/api/defaults'); const cur=(d.configured||{}).workers||0; const next=cur?0:4; await post('/api/config',{...(d.configured||{}), workers:next}); toast('Workers → '+(next?next+' cores':'full send')); renderSetup(); }catch(e){} }
async function runDoctor(){ el('doctorOut').textContent='running doctor…'; try{ const j=await post('/api/doctor',{}); const raw=j.checks||j.items||[]; const list=Array.isArray(raw)?raw:Object.entries(raw).map(([k,v])=>({name:k,ok:v})); el('doctorOut').innerHTML=list.map(c=>((c.ok!==false)?'✓ ':'✕ ')+esc(c.name||c.detail||'')).join('<br>')||esc(JSON.stringify(j).slice(0,300)); }catch(e){ el('doctorOut').textContent=e.message; } }

/* ---------- QUERY ---------- */
function onQuery(){ if(S.mode==='crate') renderCrateList(); }

/* ---------- TRANSPORT / PLAYER (carried over from the working UI) ---------- */
const AP = ()=>el('renderPlayer');
function playClip(path,start,end,name){ const a=AP(); if(!path){toast('No audio for this atom');return;} let src=audioUrl(path); if(start!=null) src+='#t='+Number(start).toFixed(2)+(end!=null?','+Number(end).toFixed(2):''); a.src=src; a.play().catch(()=>{}); el('xportName').textContent=name||'atom'; el('xportSub').textContent='auditioning'; }
function setPlayer(path){ const a=AP(); if(!path){ a.removeAttribute('src'); a.load(); el('xportName').textContent='none loaded'; el('xportSub').textContent='book a set or play a demo'; return; } window.__renderPath=path; a.src=audioUrl(path); a.play().catch(()=>{}); el('xportName').textContent=path.split(/[\\/]/).pop(); el('xportSub').textContent='render'; }
function togglePlay(){ const a=AP(); if(!a.getAttribute('src')){ toast('Nothing loaded — Book a set or Play demo'); return; } if(a.paused) a.play().catch(()=>{}); else a.pause(); }
function syncPlay(){ el('playGlyph').innerHTML = AP().paused ? '<svg width="12" height="13" viewBox="0 0 12 13"><path d="M1 1 L11 6.5 L1 12 Z" fill="var(--accink)"></path></svg>' : '<svg width="12" height="13" viewBox="0 0 12 13"><rect x="1.5" y="0" width="3.1" height="13" fill="var(--accink)"></rect><rect x="7.4" y="0" width="3.1" height="13" fill="var(--accink)"></rect></svg>'; }
function setVol(ev){ const box=ev.currentTarget; const r=box.getBoundingClientRect(); const p=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width)); AP().volume=p; el('volBar').style.width=(p*100)+'%'; }
function ecShuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
async function endlessQueue(){ const j=await api('/api/renders'); return (j.items||[]).filter(r=>r.current_engine && r.quality_gate_passed!==false).map(r=>r.path); }
async function toggleEndless(){ if(ENDLESS.on){ ENDLESS.on=false; AP().pause(); el('endlessBtn').style.color='var(--dim)'; return; } const items=await endlessQueue(); if(!items.length){ toast('No renders yet — Play demo or Book a set'); return; } ENDLESS.on=true; ENDLESS.queue=ecShuffle(items.slice()); ENDLESS.i=-1; el('endlessBtn').style.color='var(--acc)'; endlessNext(); }
function endlessNext(){ if(!ENDLESS.on)return; ENDLESS.i=(ENDLESS.i+1)%ENDLESS.queue.length; setPlayer(ENDLESS.queue[ENDLESS.i]); }
function endlessPrev(){ if(!ENDLESS.on||!ENDLESS.queue.length){ const a=AP(); if(a.src) a.currentTime=0; return; } ENDLESS.i=(ENDLESS.i-1+ENDLESS.queue.length)%ENDLESS.queue.length; setPlayer(ENDLESS.queue[ENDLESS.i]); }
function endlessSkip(){ if(ENDLESS.on) endlessNext(); }
async function playDemo(){ toast('Synthesizing a warm-up demo set…'); try{ await post('/api/demo/seed',{count:8}); const items=await endlessQueue(); if(items.length){ ENDLESS.on=true; ENDLESS.queue=ecShuffle(items.slice()); ENDLESS.i=-1; el('endlessBtn').style.color='var(--acc)'; endlessNext(); toast('Demo set playing endlessly. Book a set to compile YOUR library.'); } }catch(e){} }
async function station(sig){ try{ await post('/api/station/feedback',{signal:sig}); toast(sig==='fire'?'🔥 hotter — biases the next compile':sig==='ice'?'🧊 cooler — biases the next compile':'⏭ logged'); }catch(e){} }

/* ---------- polling ---------- */
async function pollStatus(force){
  try{ const st=await api('/api/status');
    const busy=!!st.busy; const err=(!busy&&st.last_error)?String(st.last_error):'';
    el('onlineDot').style.background=busy?'var(--acc)':(err?'var(--fault)':'var(--faint)');
    el('onlineTxt').textContent=busy?'ENGINE BUSY':(err?'ERROR':'SYSTEM ONLINE');
    el('engineTxt').textContent=busy?(String(st.message||'working').slice(0,60)):(err?err.slice(0,60):'idle');
    if(S.mode==='activity'){ renderStatus(st); if(force) renderPerfStages(); }
  }catch(e){}
}
function tickTransport(){ const a=AP(); const cur=a.currentTime||0, dur=a.duration||0; el('tElapsed').textContent=mmss(cur); el('tDur').textContent=dur?mmss(dur):'0:00'; el('tBar').style.width=(dur?(cur/dur*100):0)+'%'; syncPlay(); }

/* ---------- boot ---------- */
async function boot(){
  applySkin(); renderNav();
  // Surface any otherwise-swallowed request failure (bare api() GETs reject with
  // no catch) instead of the view silently breaking.
  window.addEventListener('unhandledrejection',ev=>{ const m=(ev.reason&&ev.reason.message)||ev.reason||'request failed'; toast('✕ '+m); });
  const a=AP(); a.addEventListener('ended',()=>{ if(ENDLESS.on) endlessNext(); }); a.addEventListener('play',syncPlay); a.addEventListener('pause',syncPlay);
  setInterval(tickTransport,500);
  setInterval(()=>pollStatus(false),2000);
  // First-run routing: an unconfigured box has nothing to Play. Land the user on
  // Setup with a nudge instead of a dead Play screen + a JAM button that 500s.
  let configured=null; try{ const d=await api('/api/defaults'); configured=d.configured; }catch(e){}
  if(!configured && S.mode==='play'){ S.mode='setup'; toast('Welcome — point EarCrate at your music folder to begin'); }
  go(S.mode);
}
boot();
</script>
