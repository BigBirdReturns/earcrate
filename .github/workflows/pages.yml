name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: stamp the shipped build into the download button
        run: |
          VER=$(grep -oP 'ENGINE_DISPLAY_VERSION = "\K[^"]+' earcrate/core/deps.py)
          HASH=$(python3 -c "import hashlib,pathlib;pkg=pathlib.Path('earcrate');h=hashlib.sha256();[h.update(f.read_bytes()) for f in sorted(pkg.rglob('*.py'))+[pkg/'ui/static/index.html']];print(h.hexdigest()[:7])")
          DAY=$(date -u +%Y-%m-%d)
          sed -i "s/__PAGE_BUILD__/${VER} · build ${HASH} · ${DAY}/" docs/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
