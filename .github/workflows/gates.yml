name: gates
on: [push, pull_request]
jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      BLIS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: ffmpeg (self-test doctor requires ffmpeg/ffprobe)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: pip install -r requirements.txt
      - name: gate tests
        run: python tests/run_gates.py
      - name: package verifier (gate suite already passed above)
        run: python VERIFY_PACKAGE.py --skip-gates
