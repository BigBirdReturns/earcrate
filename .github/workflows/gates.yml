name: gates
on: [push, pull_request]

permissions:
  contents: write

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      BLIS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply sealed Gate 8 overlay when present
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .gate8/gate8_overlay.zip ]]; then
            echo "e3e6696eeddbed3b1dfa5d27918d412862868aac304dffaa388a6532137505e5  .gate8/gate8_overlay.zip" | sha256sum -c -
            python - <<'PY'
          from pathlib import Path
          import zipfile
          root = Path.cwd().resolve()
          archive = root / '.gate8' / 'gate8_overlay.zip'
          with zipfile.ZipFile(archive) as zf:
              bad = zf.testzip()
              if bad:
                  raise SystemExit(f'corrupt overlay member: {bad}')
              for member in zf.infolist():
                  target = (root / member.filename).resolve()
                  if target != root and root not in target.parents:
                      raise SystemExit(f'unsafe overlay path: {member.filename}')
              zf.extractall(root)
          PY
          fi

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: ffmpeg (self-test doctor requires ffmpeg/ffprobe)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: pip install -r requirements.txt
      - name: gate tests
        shell: bash
        run: |
          set -o pipefail
          python tests/run_gates.py 2>&1 | tee gate.log
      - name: retain gate ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-ledger-${{ github.run_id }}
          path: gate.log
          if-no-files-found: error
          retention-days: 30
      - name: package verifier (gate suite already passed above)
        shell: bash
        run: |
          set -o pipefail
          python VERIFY_PACKAGE.py --skip-gates 2>&1 | tee package-verifier.log
      - name: retain package verifier ledger
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-verifier-${{ github.run_id }}
          path: package-verifier.log
          if-no-files-found: error
          retention-days: 30

      - name: Seal the canonical integration commit
        if: github.event_name == 'pull_request' && hashFiles('.gate8/gate8_overlay.zip') != ''
        shell: bash
        run: |
          set -euo pipefail
          cat > docs/GATE8_CANONICAL_INTEGRATION.md <<'EOF'
          # Gate 8 canonical integration

          This branch ports the tested Gate 8 custody, semantic-adoption, DJ-director,
          continuation, SourcePhrase-execution, real-library-handshake, and portable-rack
          surfaces onto the contained PR #37 repository lineage.

          - Parent: `46f4c534dc13fcf00c279ba6915da7a66552c1c9`
          - Sealed overlay SHA-256: `e3e6696eeddbed3b1dfa5d27918d412862868aac304dffaa388a6532137505e5`
          - Generated `dist/earcrate.py`: rebuilt on this lineage; no donor distribution copied
          - Storage durability: artifact imports flush and fsync a writable temporary handle
            before atomic replacement, including on Windows
          - Authority boundary: historical custody, semantic adoption, continuation,
            independent SourcePhrase execution, and portable rack resealing remain distinct
            immutable project operations

          The old 158-event proof remains a negative control. It is not promoted into the
          accepted Gate 8 lineage.
          EOF
          rm -rf .gate8
          rm -f .github/workflows/apply-gate8-overlay.yml
          git show "${{ github.event.pull_request.base.sha }}:.github/workflows/gates.yml" > .github/workflows/gates.yml
          git diff --check
          git config user.name "EarCrate Gate 8 integration"
          git config user.email "noreply@github.com"
          git add -A
          git commit -m "Integrate Gate 8 custody and continuation authority"
          git push origin HEAD:${{ github.head_ref }}
