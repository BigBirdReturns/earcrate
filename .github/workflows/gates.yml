name: gates
on: [push, pull_request]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install numpy scipy soundfile mutagen pyloudnorm "librosa>=0.10,<0.12"
      - name: gate tests
        run: python tests/test_gates.py
      - name: package verifier (includes single-file build + selftest)
        run: python VERIFY_PACKAGE.py
